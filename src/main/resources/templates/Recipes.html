<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>レシピ一覧</title>
	<link rel="stylesheet" type="text/css" href="/css/style.css">
</head>

<body>
	<header th:replace="~{header}"></header>
		
	<h3>キーワード検索</h3>
	
	<form action="/recipes" class="search-form-1" method="get">
	    <label>
	        <input type="text" name="keyword" th:value="${keyword}" placeholder="キーワードを入力">
	    </label>
	    <button type="submit" aria-label="検索"></button>
	</form>

	

	<!--<form action="/recipes" method="get">-->
	<!--	<input type="text" name="keyword" th:value="${keyword}">
		<button>検索</button>

	</form>-->

	


	カテゴリー検索:
	
	<a class="button-36" href="/recipes">全レシピ</a>

	<!--カテゴリー検索-->

	<a class="button-36" 
	 th:each="category:${categories}" th:href="@{/recipes?categoryId={id}(id = ${category.id})}"
		th:text="${category.name}" style="margin-right:7px;">

	</a>

	<hr>
	<form action="/recipes/add" method="get">
			<button>新規投稿</button>



		</form>


	<!--料理一覧-->
	<main>

	<h3>レシピ名</h3>

	<p th:each="recipe:${recipes}">
		
		<!--<td th:text="${recipe.name}"></td>-->
		<a th:href="@{/recipes/detail/{id}(id=${recipe.id})}" th:text="${recipe.name}"></a>
		<!--<a th:href="'/recipes/detail'+'${recipes.id}'" 
		th:text="${recipe.name}"></a>-->
		<!--<p th:text="${recipe.name}"></p>-->

	</p>

	<footer>レシピサイト</footer>
	</main>
</body>

</html>
