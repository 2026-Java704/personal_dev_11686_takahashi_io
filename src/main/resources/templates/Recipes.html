<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>レシピ一覧</title>
</head>

<body>

	<h1>レシピ一覧</h1>
	<hr>
	レシピ検索
	<form action="/recipes" method="get">
		<input type="text" name="keyword" th:value="${keyword}">
		<button>検索</button>

	</form>
	
	<form action="/recipes" method="get">
		<button>投稿</button>	
		
	</form>
	
	
	カテゴリー検索:
	<a href="/recipes">全レシピ</a>

	<!--カテゴリー検索-->

	<a th:each="category:${categories}"

 		th:href="@{/recipes?categoryId={id}(id = ${category.id})}" 
		 th:text="${category.name}"
		 style="margin-right:5px;">

	</a>
	<hr>

	<!--料理一覧-->

	
		<h3>レシピ名</h3>
	
	<p th:each="recipe:${recipes}">
		<!--<td th:text="${recipe.name}"></td>-->
		<a th:href="@{/recipes/detail/{id}(id=${recipe.id})}" th:text="${recipe.name}"></a>
		<!--<a th:href="'/recipes/detail'+'${recipes.id}'" 
		th:text="${recipe.name}"></a>-->
		<!--<p th:text="${recipe.name}"></p>-->
		
	</p>
		


</body>

</html>
